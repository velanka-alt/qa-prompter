<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Q&A 프롬프터</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0f0f13;
    --surface: #17171e;
    --surface2: #1e1e28;
    --border: rgba(255,255,255,0.07);
    --border2: rgba(255,255,255,0.13);
    --text: #f0f0f5;
    --text2: #9090a8;
    --text3: #5a5a72;
    --accent: #7c6fff;
    --accent2: #a599ff;
    --accent-bg: rgba(124,111,255,0.12);
    --green: #3ecf8e;
    --green-bg: rgba(62,207,142,0.1);
    --red: #f87171;
    --amber: #fbbf24;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Pretendard', -apple-system, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    font-size: 14px;
  }

  /* ── TOP BAR ── */
  .topbar {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 14px 24px;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .logo {
    font-size: 15px;
    font-weight: 600;
    color: var(--text);
    letter-spacing: -0.3px;
    margin-right: 4px;
  }
  .logo span { color: var(--accent2); }
  .mode-tabs {
    display: flex;
    gap: 4px;
    background: var(--bg);
    border-radius: 8px;
    padding: 3px;
    border: 1px solid var(--border);
  }
  .mode-tab {
    padding: 5px 14px;
    border-radius: 6px;
    border: none;
    background: transparent;
    color: var(--text2);
    font-size: 13px;
    font-family: inherit;
    cursor: pointer;
    transition: all .15s;
  }
  .mode-tab.active {
    background: var(--accent);
    color: #fff;
    font-weight: 500;
  }
  .conn-status {
    margin-left: auto;
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 12px;
    color: var(--text3);
  }
  .dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: var(--text3);
  }
  .dot.live { background: var(--green); box-shadow: 0 0 6px var(--green); animation: blink 2s infinite; }
  .dot.error { background: var(--red); }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:.4} }

  /* ── LAYOUT ── */
  .panels { display: flex; height: calc(100vh - 53px); }
  .panel { display: none; width: 100%; overflow-y: auto; }
  .panel.active { display: flex; flex-direction: column; }

  /* ── OPERATOR ── */
  .op-layout {
    display: grid;
    grid-template-columns: 320px 1fr;
    height: 100%;
  }
  .op-sidebar {
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    height: 100%;
    overflow: hidden;
  }
  .sidebar-head {
    padding: 16px;
    border-bottom: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  .search-input {
    width: 100%;
    padding: 8px 12px;
    background: var(--bg);
    border: 1px solid var(--border2);
    border-radius: 8px;
    color: var(--text);
    font-size: 13px;
    font-family: inherit;
    outline: none;
    transition: border-color .15s;
  }
  .search-input:focus { border-color: var(--accent); }
  .search-input::placeholder { color: var(--text3); }
  .cat-bar {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
  }
  .cat-btn {
    padding: 3px 10px;
    border-radius: 20px;
    border: 1px solid var(--border2);
    background: transparent;
    color: var(--text2);
    font-size: 11px;
    font-family: inherit;
    cursor: pointer;
    transition: all .15s;
  }
  .cat-btn.active {
    background: var(--accent-bg);
    border-color: var(--accent);
    color: var(--accent2);
  }
  .qa-list {
    flex: 1;
    overflow-y: auto;
    padding: 10px;
    display: flex;
    flex-direction: column;
    gap: 6px;
  }
  .qa-list::-webkit-scrollbar { width: 4px; }
  .qa-list::-webkit-scrollbar-track { background: transparent; }
  .qa-list::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }
  .qa-card {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 11px 13px;
    cursor: pointer;
    transition: all .15s;
  }
  .qa-card:hover { border-color: var(--border2); background: #22222e; }
  .qa-card.selected {
    border-color: var(--accent);
    background: var(--accent-bg);
  }
  .card-cat {
    font-size: 10px;
    color: var(--green);
    background: var(--green-bg);
    padding: 2px 7px;
    border-radius: 10px;
    display: inline-block;
    margin-bottom: 5px;
    font-weight: 500;
  }
  .card-q {
    font-size: 12px;
    font-weight: 500;
    color: var(--text);
    line-height: 1.5;
    margin-bottom: 3px;
  }
  .card-a-prev {
    font-size: 11px;
    color: var(--text3);
    line-height: 1.4;
    overflow: hidden;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
  }

  /* ── OPERATOR RIGHT ── */
  .op-main {
    display: flex;
    flex-direction: column;
    height: 100%;
    overflow: hidden;
  }
  .op-main-head {
    padding: 20px 24px 16px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .op-main-head h2 {
    font-size: 14px;
    font-weight: 500;
    color: var(--text2);
  }
  .selected-preview {
    flex: 1;
    overflow-y: auto;
    padding: 24px;
  }
  .selected-preview::-webkit-scrollbar { width: 4px; }
  .selected-preview::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }
  .empty-state {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100%;
    gap: 12px;
    color: var(--text3);
  }
  .empty-icon { font-size: 40px; opacity: .3; }
  .preview-cat {
    font-size: 11px;
    color: var(--green);
    background: var(--green-bg);
    padding: 3px 10px;
    border-radius: 10px;
    display: inline-block;
    margin-bottom: 14px;
    font-weight: 500;
  }
  .preview-q {
    font-size: 20px;
    font-weight: 600;
    color: var(--text);
    line-height: 1.5;
    margin-bottom: 20px;
    padding-bottom: 20px;
    border-bottom: 1px solid var(--border);
    letter-spacing: -0.3px;
  }
  .preview-a {
    font-size: 14px;
    color: var(--text2);
    line-height: 1.9;
    white-space: pre-wrap;
  }
  .preview-a .bullet {
    display: flex;
    gap: 8px;
    margin-bottom: 6px;
  }
  .op-footer {
    padding: 16px 24px;
    border-top: 1px solid var(--border);
    display: flex;
    gap: 10px;
    align-items: center;
  }
  .send-btn {
    padding: 9px 22px;
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: 8px;
    font-size: 13px;
    font-family: inherit;
    font-weight: 500;
    cursor: pointer;
    transition: all .15s;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .send-btn:hover { background: #6a5ef0; }
  .send-btn:disabled { opacity: .35; cursor: not-allowed; }
  .clear-btn {
    padding: 9px 16px;
    border: 1px solid var(--border2);
    border-radius: 8px;
    background: transparent;
    color: var(--text2);
    font-size: 13px;
    font-family: inherit;
    cursor: pointer;
    transition: all .15s;
  }
  .clear-btn:hover { border-color: var(--red); color: var(--red); }
  .send-status {
    margin-left: auto;
    font-size: 12px;
    color: var(--text3);
  }
  .add-btn {
    padding: 9px 16px;
    border: 1px dashed var(--border2);
    border-radius: 8px;
    background: transparent;
    color: var(--text3);
    font-size: 13px;
    font-family: inherit;
    cursor: pointer;
    transition: all .15s;
  }
  .add-btn:hover { border-color: var(--accent); color: var(--accent2); }

  /* ── ADD MODAL ── */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,.7);
    z-index: 200;
    align-items: center;
    justify-content: center;
  }
  .modal-overlay.open { display: flex; }
  .modal {
    background: var(--surface);
    border: 1px solid var(--border2);
    border-radius: 14px;
    padding: 24px;
    width: 480px;
    max-width: 90vw;
  }
  .modal h3 {
    font-size: 16px;
    font-weight: 600;
    margin-bottom: 20px;
    color: var(--text);
  }
  .field { margin-bottom: 14px; }
  .field label {
    display: block;
    font-size: 12px;
    color: var(--text3);
    margin-bottom: 5px;
  }
  .field input, .field textarea, .field select {
    width: 100%;
    padding: 9px 12px;
    background: var(--bg);
    border: 1px solid var(--border2);
    border-radius: 8px;
    color: var(--text);
    font-size: 13px;
    font-family: inherit;
    outline: none;
    transition: border-color .15s;
  }
  .field input:focus, .field textarea:focus { border-color: var(--accent); }
  .field textarea { resize: vertical; min-height: 100px; line-height: 1.6; }
  .modal-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 4px; }
  .btn-save {
    padding: 8px 20px;
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: 8px;
    font-size: 13px;
    font-family: inherit;
    font-weight: 500;
    cursor: pointer;
  }
  .btn-cancel {
    padding: 8px 16px;
    border: 1px solid var(--border2);
    border-radius: 8px;
    background: transparent;
    color: var(--text2);
    font-size: 13px;
    font-family: inherit;
    cursor: pointer;
  }

  /* ── PRESENTER ── */
  .presenter-panel {
    display: none;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: calc(100vh - 53px);
    padding: 48px 24px;
    background: var(--bg);
    position: relative;
  }
  .presenter-panel.active { display: flex; }
  .presenter-empty {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 14px;
    color: var(--text3);
  }
  .presenter-empty .big-icon { font-size: 56px; opacity: .2; }
  .presenter-empty p { font-size: 15px; }
  .presenter-card-wrap {
    display: none;
    width: 100%;
    max-width: 760px;
    animation: fadeup .35s ease;
  }
  @keyframes fadeup { from{opacity:0;transform:translateY(16px)} to{opacity:1;transform:translateY(0)} }
  .presenter-badge {
    display: none;
    position: fixed;
    top: 70px;
    right: 24px;
    background: var(--accent);
    color: #fff;
    font-size: 12px;
    font-weight: 500;
    padding: 6px 14px;
    border-radius: 20px;
    animation: popbadge .3s ease;
    z-index: 150;
  }
  @keyframes popbadge { from{opacity:0;transform:scale(.8)} to{opacity:1;transform:scale(1)} }
  .p-cat {
    font-size: 12px;
    color: var(--green);
    background: var(--green-bg);
    border: 1px solid rgba(62,207,142,0.2);
    padding: 4px 12px;
    border-radius: 20px;
    display: inline-block;
    margin-bottom: 20px;
    font-weight: 500;
    letter-spacing: .3px;
  }
  .p-q {
    font-size: 28px;
    font-weight: 600;
    color: var(--text);
    line-height: 1.45;
    margin-bottom: 28px;
    padding-bottom: 28px;
    border-bottom: 1px solid var(--border2);
    letter-spacing: -0.5px;
  }
  .p-a {
    font-size: 17px;
    color: var(--text2);
    line-height: 2;
    white-space: pre-wrap;
  }
  .p-hint {
    margin-top: 28px;
    padding-top: 20px;
    border-top: 1px solid var(--border);
    font-size: 12px;
    color: var(--text3);
    display: flex;
    align-items: center;
    gap: 6px;
  }

  /* ── NO RESULT ── */
  .no-result {
    text-align: center;
    padding: 32px;
    color: var(--text3);
    font-size: 13px;
  }

  /* ── SCROLLBAR ── */
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }
</style>
</head>
<body>

<!-- TOP BAR -->
<div class="topbar">
  <div class="logo">Q&A <span>Prompter</span></div>
  <div class="mode-tabs">
    <button class="mode-tab active" onclick="setMode('operator')">운영자</button>
    <button class="mode-tab" onclick="setMode('presenter')">답변자</button>
  </div>
  <div class="conn-status">
    <div class="dot" id="conn-dot"></div>
    <span id="conn-txt">연결 중...</span>
  </div>
</div>

<!-- OPERATOR PANEL -->
<div class="panels">
<div class="panel active" id="panel-operator">
  <div class="op-layout">
    <!-- 사이드바 -->
    <div class="op-sidebar">
      <div class="sidebar-head">
        <input class="search-input" id="search" type="text" placeholder="🔍  질문 키워드 검색..." oninput="renderList()">
        <div class="cat-bar" id="cat-bar"></div>
      </div>
      <div class="qa-list" id="qa-list"></div>
    </div>
    <!-- 메인 -->
    <div class="op-main">
      <div class="op-main-head">
        <h2 id="preview-title">카드를 선택하세요</h2>
      </div>
      <div class="selected-preview" id="selected-preview">
        <div class="empty-state">
          <div class="empty-icon">📋</div>
          <div style="font-size:14px">왼쪽에서 Q&A 카드를 선택하세요</div>
          <div style="font-size:12px;color:var(--text3)">선택 후 답변자 화면에 전송할 수 있습니다</div>
        </div>
      </div>
      <div class="op-footer">
        <button class="send-btn" id="send-btn" disabled onclick="sendCard()">
          ▶ 답변자 화면에 전송
        </button>
        <button class="clear-btn" onclick="clearCard()">화면 지우기</button>
        <button class="add-btn" onclick="openAddModal()">+ 카드 추가</button>
        <span class="send-status" id="send-status"></span>
      </div>
    </div>
  </div>
</div>

<!-- PRESENTER PANEL -->
<div class="presenter-panel" id="panel-presenter">
  <div class="presenter-badge" id="p-badge">새 질문 도착!</div>
  <div class="presenter-empty" id="p-empty">
    <div class="big-icon">📡</div>
    <p>운영자가 카드를 전송하면 여기에 표시됩니다</p>
    <p style="font-size:13px">실시간 연결 중 — 리로드 불필요</p>
  </div>
  <div class="presenter-card-wrap" id="p-card">
    <div class="p-cat" id="p-cat"></div>
    <div class="p-q" id="p-q"></div>
    <div class="p-a" id="p-a"></div>
    <div class="p-hint">📌 위 내용을 참고해 자연스럽게 답변하세요</div>
  </div>
</div>
</div>

<!-- ADD MODAL -->
<div class="modal-overlay" id="modal">
  <div class="modal">
    <h3>새 Q&A 카드 추가</h3>
    <div class="field">
      <label>카테고리</label>
      <input type="text" id="m-cat" placeholder="예: 운영방식, 비용, Belbin 진단...">
    </div>
    <div class="field">
      <label>예상 질문</label>
      <input type="text" id="m-q" placeholder="청중이 물어볼 법한 질문을 입력하세요">
    </div>
    <div class="field">
      <label>답변 키포인트 (줄바꿈으로 구분)</label>
      <textarea id="m-a" placeholder="• 핵심 포인트 1&#10;• 핵심 포인트 2&#10;• 핵심 포인트 3"></textarea>
    </div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal()">취소</button>
      <button class="btn-save" onclick="saveCard()">저장</button>
    </div>
  </div>
</div>

<script>
const FIREBASE_URL = 'https://qna-prompter-default-rtdb.firebaseio.com';
const QA_PATH = '/qa_current.json';

let qaData = [
  {id:1,cat:"운영방식",q:"이 워크숍은 어떤 방식으로 진행되나요?",a:"• 강의 30% + 실습/토론 70% 혼합 방식\n• 소그룹(4~6명) 중심 활동 설계\n• 각 세션마다 현업 적용 가능한 아웃풋 도출\n• 팀 진단 결과 기반 맞춤형 피드백 제공"},
  {id:2,cat:"운영방식",q:"온라인으로도 진행 가능한가요?",a:"• Zoom/Teams 기반 온라인 버전 가능\n• Miro, Padlet 등 협업 툴 활용\n• 오프라인 대비 80% 수준으로 진행 가능\n• 하이브리드 조합도 별도 협의 가능"},
  {id:3,cat:"비용·일정",q:"비용은 어떻게 산정되나요?",a:"• 인원, 시간, 커스터마이징 수준에 따라 산정\n• 기본 견적은 사전 미팅 후 제안서로 제출\n• 재계약 시 할인 적용 가능\n• 진단/교육/코칭 분리 발주 구조도 가능"},
  {id:4,cat:"비용·일정",q:"얼마나 빨리 섭외 가능한가요?",a:"• 제안서 확정 후 2~3주 이내 가능\n• 성수기(3월, 9월)는 4주 전 협의 권장\n• 긴급 건은 기본 커리큘럼 활용 시 1주 가능"},
  {id:5,cat:"Belbin 진단",q:"Belbin 팀롤 진단이 왜 필요한가요?",a:"• 개인 강점 역할을 객관적 데이터로 확인\n• 팀 단위 역할 분포 시각화\n• 역할 갈등·공백 원인 규명 가능\n• 33개국 글로벌 표준 도구"},
  {id:6,cat:"Belbin 진단",q:"진단 없이도 교육이 가능한가요?",a:"• 가능 — 샘플 리포트 활용 버전 운영 중\n• 팀롤 개념, 팀 구성 원리 학습 가능\n• 개인 맞춤 피드백은 진단 결과 있어야 깊이 있음\n• 교육 후 진단 도입 검토하는 기업도 많음"},
  {id:7,cat:"레퍼런스",q:"어떤 기업들과 일해봤나요?",a:"• 삼성전자 DS부문, LG CNS, 아모레퍼시픽 등\n• 공공기관, 스타트업, 협동조합까지 규모 무관\n• 리더십·조직문화·커뮤니케이션 전반\n• 상세 케이스는 제안서 내 별첨 가능"},
  {id:8,cat:"레퍼런스",q:"비슷한 업종 레퍼런스가 있나요?",a:"• 업종별 케이스는 사전 미팅에서 NDA 하에 공유\n• 유사 업종 경험 여부는 미팅 시 구체적으로 확인\n• 업종보다 '조직 이슈 유형' 기준으로 적합 사례 제시"},
  {id:9,cat:"효과·성과",q:"워크숍 효과를 어떻게 측정하나요?",a:"• 사전/사후 설문으로 인식 변화 측정\n• 행동 변화 지표: 적용 계획 이행률 체크\n• 3개월 후 팔로업 코칭 옵션 제공\n• ROI보다 '실제 현업 변화' 중심으로 보고"},
  {id:10,cat:"효과·성과",q:"1회성 워크숍으로 변화가 가능한가요?",a:"• 인식 전환, 팀 언어 형성은 1회로도 가능\n• 행동 변화 안착은 최소 3회 이상 권장\n• 단발성이라도 '후속 액션 플랜' 수립 포함\n• 예산 제약 시 핵심 1회 + 셀프학습 자료 패키지 가능"},
];

let selectedId = null;
let currentCat = '전체';
let lastTs = null;
let pollTimer = null;

// ── Firebase ──
async function fbSet(data) {
  const res = await fetch(FIREBASE_URL + QA_PATH, {
    method: 'PUT',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(data)
  });
  return res.ok;
}
async function fbGet() {
  const res = await fetch(FIREBASE_URL + QA_PATH);
  if (!res.ok) return null;
  return await res.json();
}

// ── Connection check ──
async function checkConn() {
  try {
    const d = await fbGet();
    setConn(true);
    return d;
  } catch(e) {
    setConn(false);
    return null;
  }
}
function setConn(ok) {
  document.getElementById('conn-dot').className = 'dot ' + (ok ? 'live' : 'error');
  document.getElementById('conn-txt').textContent = ok ? 'Firebase 연결됨' : '연결 실패';
}

// ── Categories ──
function allCats() {
  return ['전체', ...new Set(qaData.map(x => x.cat))];
}
function renderCatBar() {
  document.getElementById('cat-bar').innerHTML = allCats().map(c =>
    `<button class="cat-btn${c === currentCat ? ' active' : ''}" onclick="setCat('${c}')">${c}</button>`
  ).join('');
}
function setCat(c) { currentCat = c; renderCatBar(); renderList(); }

// ── List ──
function renderList() {
  const kw = document.getElementById('search').value.toLowerCase();
  const filtered = qaData.filter(x => {
    const mc = currentCat === '전체' || x.cat === currentCat;
    const mk = !kw || x.q.toLowerCase().includes(kw) || x.a.toLowerCase().includes(kw) || x.cat.toLowerCase().includes(kw);
    return mc && mk;
  });
  const el = document.getElementById('qa-list');
  if (!filtered.length) { el.innerHTML = '<div class="no-result">검색 결과 없음</div>'; return; }
  el.innerHTML = filtered.map(x => `
    <div class="qa-card${x.id === selectedId ? ' selected' : ''}" onclick="selectCard(${x.id})">
      <div class="card-cat">${x.cat}</div>
      <div class="card-q">${x.q}</div>
      <div class="card-a-prev">${x.a.replace(/•\s*/g,'').replace(/\n/g,' ')}</div>
    </div>`).join('');
}

// ── Select ──
function selectCard(id) {
  selectedId = id;
  renderList();
  const card = qaData.find(x => x.id === id);
  if (!card) return;
  document.getElementById('preview-title').textContent = card.cat + ' — 선택됨';
  document.getElementById('selected-preview').innerHTML = `
    <div class="preview-cat">${card.cat}</div>
    <div class="preview-q">${card.q}</div>
    <div class="preview-a">${card.a}</div>`;
  document.getElementById('send-btn').disabled = false;
}

// ── Send ──
async function sendCard() {
  const card = qaData.find(x => x.id === selectedId);
  if (!card) return;
  const btn = document.getElementById('send-btn');
  btn.disabled = true;
  btn.textContent = '전송 중...';
  const payload = { ...card, ts: Date.now(), clear: false };
  const ok = await fbSet(payload);
  document.getElementById('send-status').textContent = ok
    ? '✓ ' + new Date().toLocaleTimeString('ko') + ' 전송 완료'
    : '⚠ 전송 실패 — Firebase 확인 필요';
  btn.textContent = '▶ 답변자 화면에 전송';
  btn.disabled = false;
}

async function clearCard() {
  await fbSet({ clear: true, ts: Date.now() });
  selectedId = null;
  document.getElementById('send-btn').disabled = true;
  document.getElementById('send-status').textContent = '';
  document.getElementById('preview-title').textContent = '카드를 선택하세요';
  document.getElementById('selected-preview').innerHTML = `
    <div class="empty-state">
      <div class="empty-icon">📋</div>
      <div style="font-size:14px">왼쪽에서 Q&A 카드를 선택하세요</div>
    </div>`;
  renderList();
}

// ── Add Modal ──
function openAddModal() { document.getElementById('modal').classList.add('open'); }
function closeModal() { document.getElementById('modal').classList.remove('open'); }
function saveCard() {
  const cat = document.getElementById('m-cat').value.trim();
  const q = document.getElementById('m-q').value.trim();
  const a = document.getElementById('m-a').value.trim();
  if (!cat || !q || !a) { alert('모든 항목을 입력해주세요'); return; }
  qaData.push({ id: Date.now(), cat, q, a });
  document.getElementById('m-cat').value = '';
  document.getElementById('m-q').value = '';
  document.getElementById('m-a').value = '';
  closeModal();
  renderCatBar();
  renderList();
}

// ── Presenter polling ──
function startPolling() {
  if (pollTimer) return;
  pollTimer = setInterval(async () => {
    try {
      const data = await fbGet();
      if (!data || data.ts === lastTs) return;
      lastTs = data.ts;
      setConn(true);
      if (data.clear) { showPresenterEmpty(); return; }
      showPresenterCard(data);
    } catch(e) { setConn(false); }
  }, 1500);
}

function showPresenterCard(d) {
  document.getElementById('p-empty').style.display = 'none';
  document.getElementById('p-card').style.display = 'block';
  document.getElementById('p-cat').textContent = d.cat;
  document.getElementById('p-q').textContent = d.q;
  document.getElementById('p-a').textContent = d.a;
  const badge = document.getElementById('p-badge');
  badge.style.display = 'block';
  setTimeout(() => badge.style.display = 'none', 2800);
}
function showPresenterEmpty() {
  document.getElementById('p-empty').style.display = 'flex';
  document.getElementById('p-card').style.display = 'none';
}

// ── Mode ──
function setMode(m) {
  document.querySelectorAll('.mode-tab').forEach((b, i) => {
    b.classList.toggle('active', ['operator','presenter'][i] === m);
  });
  document.getElementById('panel-operator').classList.toggle('active', m === 'operator');
  const pp = document.getElementById('panel-presenter');
  pp.classList.toggle('active', m === 'presenter');
  if (m === 'presenter') startPolling();
}

// ── URL param auto-mode ──
const urlMode = new URLSearchParams(location.search).get('mode');
if (urlMode === 'presenter') setMode('presenter');

// ── Init ──
renderCatBar();
renderList();
checkConn();
setInterval(checkConn, 10000);
startPolling();
</script>
</body>
</html>
