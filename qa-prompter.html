
<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Q&A 프롬프터</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0f0f13;
    --surface: #17171e;
    --surface2: #1e1e28;
    --border: rgba(255,255,255,0.07);
    --border2: rgba(255,255,255,0.13);
    --text: #f0f0f5;
    --text2: #9090a8;
    --text3: #5a5a72;
    --accent: #7c6fff;
    --accent2: #a599ff;
    --accent-bg: rgba(124,111,255,0.12);
    --green: #3ecf8e;
    --green-bg: rgba(62,207,142,0.1);
    --red: #f87171;
    --amber: #fbbf24;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Pretendard', -apple-system, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; font-size: 14px; }
  .topbar { display: flex; align-items: center; gap: 12px; padding: 14px 24px; border-bottom: 1px solid var(--border); background: var(--surface); position: sticky; top: 0; z-index: 100; }
  .logo { font-size: 15px; font-weight: 600; color: var(--text); letter-spacing: -0.3px; margin-right: 4px; }
  .logo span { color: var(--accent2); }
  .mode-tabs { display: flex; gap: 4px; background: var(--bg); border-radius: 8px; padding: 3px; border: 1px solid var(--border); }
  .mode-tab { padding: 5px 14px; border-radius: 6px; border: none; background: transparent; color: var(--text2); font-size: 13px; font-family: inherit; cursor: pointer; transition: all .15s; }
  .mode-tab.active { background: var(--accent); color: #fff; font-weight: 500; }
  .conn-status { margin-left: auto; display: flex; align-items: center; gap: 6px; font-size: 12px; color: var(--text3); }
  .dot { width: 7px; height: 7px; border-radius: 50%; background: var(--text3); }
  .dot.live { background: var(--green); box-shadow: 0 0 6px var(--green); animation: blink 2s infinite; }
  .dot.error { background: var(--red); }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:.4} }
  .panels { display: flex; height: calc(100vh - 53px); }
  .panel { display: none; width: 100%; overflow-y: auto; }
  .panel.active { display: flex; flex-direction: column; }
  .op-layout { display: grid; grid-template-columns: 320px 1fr; height: 100%; }
  .op-sidebar { border-right: 1px solid var(--border); display: flex; flex-direction: column; height: 100%; overflow: hidden; }
  .sidebar-head { padding: 16px; border-bottom: 1px solid var(--border); display: flex; flex-direction: column; gap: 10px; }
  .search-input { width: 100%; padding: 8px 12px; background: var(--bg); border: 1px solid var(--border2); border-radius: 8px; color: var(--text); font-size: 13px; font-family: inherit; outline: none; transition: border-color .15s; }
  .search-input:focus { border-color: var(--accent); }
  .search-input::placeholder { color: var(--text3); }
  .cat-bar { display: flex; gap: 6px; flex-wrap: wrap; }
  .cat-btn { padding: 3px 10px; border-radius: 20px; border: 1px solid var(--border2); background: transparent; color: var(--text2); font-size: 11px; font-family: inherit; cursor: pointer; transition: all .15s; }
  .cat-btn.active { background: var(--accent-bg); border-color: var(--accent); color: var(--accent2); }
  .qa-list { flex: 1; overflow-y: auto; padding: 10px; display: flex; flex-direction: column; gap: 6px; }
  .qa-list::-webkit-scrollbar { width: 4px; }
  .qa-list::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }
  .qa-card { background: var(--surface2); border: 1px solid var(--border); border-radius: 10px; padding: 11px 13px; cursor: pointer; transition: all .15s; }
  .qa-card:hover { border-color: var(--border2); background: #22222e; }
  .qa-card.selected { border-color: var(--accent); background: var(--accent-bg); }
  .card-num { font-size: 10px; color: var(--text3); margin-bottom: 3px; }
  .card-cat { font-size: 10px; color: var(--green); background: var(--green-bg); padding: 2px 7px; border-radius: 10px; display: inline-block; margin-bottom: 5px; font-weight: 500; }
  .card-q { font-size: 12px; font-weight: 500; color: var(--text); line-height: 1.5; margin-bottom: 3px; }
  .card-a-prev { font-size: 11px; color: var(--text3); line-height: 1.4; overflow: hidden; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; }
  .op-main { display: flex; flex-direction: column; height: 100%; overflow: hidden; }
  .op-main-head { padding: 20px 24px 16px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 12px; }
  .op-main-head h2 { font-size: 14px; font-weight: 500; color: var(--text2); }
  .selected-preview { flex: 1; overflow-y: auto; padding: 24px; }
  .selected-preview::-webkit-scrollbar { width: 4px; }
  .selected-preview::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }
  .empty-state { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; gap: 12px; color: var(--text3); }
  .empty-icon { font-size: 40px; opacity: .3; }
  .preview-cat { font-size: 11px; color: var(--green); background: var(--green-bg); border: 1px solid rgba(62,207,142,0.2); padding: 3px 10px; border-radius: 10px; display: inline-block; margin-bottom: 14px; font-weight: 500; }
  .preview-q { font-size: 20px; font-weight: 600; color: var(--text); line-height: 1.5; margin-bottom: 20px; padding-bottom: 20px; border-bottom: 1px solid var(--border); letter-spacing: -0.3px; }
  .preview-a { font-size: 14px; color: var(--text2); line-height: 1.9; white-space: pre-wrap; }
  .op-footer { padding: 16px 24px; border-top: 1px solid var(--border); display: flex; gap: 10px; align-items: center; }
  .send-btn { padding: 9px 22px; background: var(--accent); color: #fff; border: none; border-radius: 8px; font-size: 13px; font-family: inherit; font-weight: 500; cursor: pointer; transition: all .15s; }
  .send-btn:hover { background: #6a5ef0; }
  .send-btn:disabled { opacity: .35; cursor: not-allowed; }
  .clear-btn { padding: 9px 16px; border: 1px solid var(--border2); border-radius: 8px; background: transparent; color: var(--text2); font-size: 13px; font-family: inherit; cursor: pointer; transition: all .15s; }
  .clear-btn:hover { border-color: var(--red); color: var(--red); }
  .send-status { margin-left: auto; font-size: 12px; color: var(--text3); }
  .add-btn { padding: 9px 16px; border: 1px dashed var(--border2); border-radius: 8px; background: transparent; color: var(--text3); font-size: 13px; font-family: inherit; cursor: pointer; transition: all .15s; }
  .add-btn:hover { border-color: var(--accent); color: var(--accent2); }
  .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.7); z-index: 200; align-items: center; justify-content: center; }
  .modal-overlay.open { display: flex; }
  .modal { background: var(--surface); border: 1px solid var(--border2); border-radius: 14px; padding: 24px; width: 480px; max-width: 90vw; }
  .modal h3 { font-size: 16px; font-weight: 600; margin-bottom: 20px; color: var(--text); }
  .field { margin-bottom: 14px; }
  .field label { display: block; font-size: 12px; color: var(--text3); margin-bottom: 5px; }
  .field input, .field textarea { width: 100%; padding: 9px 12px; background: var(--bg); border: 1px solid var(--border2); border-radius: 8px; color: var(--text); font-size: 13px; font-family: inherit; outline: none; transition: border-color .15s; }
  .field input:focus, .field textarea:focus { border-color: var(--accent); }
  .field textarea { resize: vertical; min-height: 100px; line-height: 1.6; }
  .modal-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 4px; }
  .btn-save { padding: 8px 20px; background: var(--accent); color: #fff; border: none; border-radius: 8px; font-size: 13px; font-family: inherit; font-weight: 500; cursor: pointer; }
  .btn-cancel { padding: 8px 16px; border: 1px solid var(--border2); border-radius: 8px; background: transparent; color: var(--text2); font-size: 13px; font-family: inherit; cursor: pointer; }
  .presenter-panel { display: none; flex-direction: column; align-items: center; justify-content: center; min-height: calc(100vh - 53px); padding: 48px 24px; background: var(--bg); position: relative; }
  .presenter-panel.active { display: flex; }
  .presenter-empty { display: flex; flex-direction: column; align-items: center; gap: 14px; color: var(--text3); }
  .presenter-empty .big-icon { font-size: 56px; opacity: .2; }
  .presenter-empty p { font-size: 15px; }
  .presenter-card-wrap { display: none; width: 100%; max-width: 760px; animation: fadeup .35s ease; }
  @keyframes fadeup { from{opacity:0;transform:translateY(16px)} to{opacity:1;transform:translateY(0)} }
  .presenter-badge { display: none; position: fixed; top: 70px; right: 24px; background: var(--accent); color: #fff; font-size: 12px; font-weight: 500; padding: 6px 14px; border-radius: 20px; animation: popbadge .3s ease; z-index: 150; }
  @keyframes popbadge { from{opacity:0;transform:scale(.8)} to{opacity:1;transform:scale(1)} }
  .p-cat { font-size: 12px; color: var(--green); background: var(--green-bg); border: 1px solid rgba(62,207,142,0.2); padding: 4px 12px; border-radius: 20px; display: inline-block; margin-bottom: 20px; font-weight: 500; letter-spacing: .3px; }
  .p-q { font-size: 28px; font-weight: 600; color: var(--text); line-height: 1.45; margin-bottom: 28px; padding-bottom: 28px; border-bottom: 1px solid var(--border2); letter-spacing: -0.5px; }
  .p-a { font-size: 17px; color: var(--text2); line-height: 2; white-space: pre-wrap; }
  .p-hint { margin-top: 28px; padding-top: 20px; border-top: 1px solid var(--border); font-size: 12px; color: var(--text3); display: flex; align-items: center; gap: 6px; }
  .no-result { text-align: center; padding: 32px; color: var(--text3); font-size: 13px; }
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }
</style>
</head>
<body>

<div class="topbar">
  <div class="logo">Q&A <span>Prompter</span></div>
  <div class="mode-tabs">
    <button class="mode-tab active" onclick="setMode('operator')">운영자</button>
    <button class="mode-tab" onclick="setMode('presenter')">답변자</button>
  </div>
  <div class="conn-status">
    <div class="dot" id="conn-dot"></div>
    <span id="conn-txt">연결 중...</span>
  </div>
</div>

<div class="panels">
<div class="panel active" id="panel-operator">
  <div class="op-layout">
    <div class="op-sidebar">
      <div class="sidebar-head">
        <input class="search-input" id="search" type="text" placeholder="🔍  질문 키워드 검색..." oninput="renderList()">
        <div class="cat-bar" id="cat-bar"></div>
      </div>
      <div class="qa-list" id="qa-list"></div>
    </div>
    <div class="op-main">
      <div class="op-main-head">
        <h2 id="preview-title">카드를 선택하세요</h2>
      </div>
      <div class="selected-preview" id="selected-preview">
        <div class="empty-state">
          <div class="empty-icon">📋</div>
          <div style="font-size:14px">왼쪽에서 Q&A 카드를 선택하세요</div>
          <div style="font-size:12px;color:var(--text3)">선택 후 답변자 화면에 전송할 수 있습니다</div>
        </div>
      </div>
      <div class="op-footer">
        <button class="send-btn" id="send-btn" disabled onclick="sendCard()">▶ 답변자 화면에 전송</button>
        <button class="clear-btn" onclick="clearCard()">화면 지우기</button>
        <button class="add-btn" onclick="openAddModal()">+ 카드 추가</button>
        <span class="send-status" id="send-status"></span>
      </div>
    </div>
  </div>
</div>

<div class="presenter-panel" id="panel-presenter">
  <div class="presenter-badge" id="p-badge">새 질문 도착!</div>
  <div class="presenter-empty" id="p-empty">
    <div class="big-icon">📡</div>
    <p>운영자가 카드를 전송하면 여기에 표시됩니다</p>
    <p style="font-size:13px">실시간 연결 중 — 리로드 불필요</p>
  </div>
  <div class="presenter-card-wrap" id="p-card">
    <div class="p-cat" id="p-cat"></div>
    <div class="p-q" id="p-q"></div>
    <div class="p-a" id="p-a"></div>
    <div class="p-hint">📌 위 내용을 참고해 자연스럽게 답변하세요</div>
  </div>
</div>
</div>

<div class="modal-overlay" id="modal">
  <div class="modal">
    <h3>새 Q&A 카드 추가</h3>
    <div class="field"><label>카테고리</label><input type="text" id="m-cat" placeholder="예: 자기소개, 프로젝트..."></div>
    <div class="field"><label>질문</label><input type="text" id="m-q" placeholder="예상 질문을 입력하세요"></div>
    <div class="field"><label>답변</label><textarea id="m-a" placeholder="답변 내용을 입력하세요"></textarea></div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal()">취소</button>
      <button class="btn-save" onclick="saveCard()">저장</button>
    </div>
  </div>
</div>

<script>
const FIREBASE_URL = 'https://qna-prompter-default-rtdb.firebaseio.com';
const QA_PATH = '/qa_current.json';

let qaData = [
  {id:1, cat:"자기소개", q:"Q1. Tell us about yourself. (자기소개)", a:"Hello. My name is Shinu Kim. I am a first-year student at Halla Middle School in Jeju.\nI like science, especially dinosaurs, space, and weather.\nI also made a Jeju language app.\nI enjoy learning new things and working with other people."},
  {id:2, cat:"지원동기", q:"Q2. Why do you want to join APT JSO-11? (이번 프로그램 지원동기)", a:"I want to join because the topic is climate.\nI am interested in climate change and the environment.\nI want to do science experiments and learn with students from other countries.\nAlso, this is my first international science program, so I want to challenge myself."},
  {id:3, cat:"관심분야", q:"Q3. Why are you interested in climate change? (왜 기후변화에 관심을 가지게 되었나)", a:"I live in Jeju Island.\nWe often have typhoons and heavy rain. Sometimes the weather changes very quickly. I wanted to know why this happens. Then I learned about climate change.\nI think Science can help. That is why I became interested in this topic."},
  {id:4, cat:"프로젝트", q:"Q4. Explain your Jeju language app project. (앱 설명)", a:"My project is a translation app. It changes Jeju language into Korean and Korean into Jeju language. I started this project because fewer people use Jeju language now. I wanted to help protect our local culture. In the future, I want to add AI and voice recognition."},
  {id:5, cat:"프로젝트", q:"Q5. What did you learn from the project? (앱개발하며 배우게 된 것)", a:"In this project, I learned two things.\nFirst, technology can help protect culture and language.\nSecond, teamwork is very important. I could not do everything alone.\nMy teammates helped me, and I helped my teammates to solve problems."},
  {id:6, cat:"관심분야", q:"Q6. How can AI help society? (AI가 세상을 어떻게 도울까?)", a:"AI can help people do things faster and easier. For example, it can help doctors and students. AI can also help people make better decisions. I think AI can help solve environmental problems in the future."},
  {id:7, cat:"팀워크·기여", q:"Q7. How would you contribute to the Korean team? (우리 팀에 어떻게 기여할 건지)", a:"I am responsible and I always do my best. I like listening to other people's ideas.\nI enjoy teamwork and cooperation. I will actively join experiments and discussions.\nI will also bring positive energy to the team."},
  {id:8, cat:"한국·제주", q:"Q8. How would you introduce Korea? (한국을 소개)", a:"I want to introduce Korea as a country with both tradition and technology together.\nI especially want to talk about Hangul. King Sejong created Hangul so people could learn it easily. I think language and culture are very important.\nKorean students also enjoy learning and working together."},
  {id:9, cat:"인성·태도", q:"Q9. What would you do if your experiment failed? (실험에서 실패하면 어떻게)", a:"I would not give up.\nFirst, I would check the experiment again.\nThen I would find the problem and try again.\nI think failure is also part of learning.\nI would work with my teammates to find a better way."},
  {id:10, cat:"인성·태도", q:"Q10. What was the most difficult part of making the Jeju language app, and how did you overcome it?", a:"The hardest part was making the translation system. It was difficult to connect Jeju words and Korean words. I talked with my teammates and fixed the code together.\nAfter many tries, it worked better.\n\nOne of the hardest things in my life was having allergies. It was difficult because there were foods I could not eat. But I did not give up.\nI controlled my diet and tried to stay healthy. Slowly, I got better.\nI learned that it is important to stay positive and keep trying.\nNow I always try my best when I meet a difficult problem."},
  {id:11, cat:"관심분야", q:"Q11. What is one small habit you practice in your daily life to protect the environment? (환경보호를 위한 나의 노력)", a:"I try not to waste food. I also try to reduce meat goods when possible.\nI think small actions can help the environment.\nI want to make good habits for the future."},
  {id:12, cat:"팀워크·기여", q:"Q12. In a team project, what would you do if a teammate has a different opinion from yours? (팀과 생각이 달랐을 때)", a:"First, I would listen carefully. I respect different ideas.\nThen I would look for a common idea. I think good teamwork comes from communication."},
  {id:13, cat:"한국·제주", q:"Q13. If a student from another country has a prejudice about Korea, how will you respond? (한국문화에 대한 편견이 있을 때)", a:"I would explain kindly.\nI would tell them about Korean culture and daily life.\nI think talking and sharing information can remove misunderstandings."},
  {id:14, cat:"지원동기", q:"Q14. If you are accepted, what is the first thing you want to prepare? (대표 선발되면 무엇을 준비할 건가)", a:"First, I would study English.\nI want to communicate better with other students.\nSecond, I would learn more about climate change.\nI want to be ready for the program."},
  {id:15, cat:"팀워크·기여", q:"Q15. What do you think is the most important quality of a global science leader? (글로벌 사이언스 리더의 덕목)", a:"I think a good science leader listens to other people.\nA leader should respect different ideas.\nA leader should also help the team work together.\nTeamwork is very important."},
  {id:16, cat:"프로젝트", q:"Q16. Why did you choose the Jeju language?", a:"Because fewer people use the Jeju language today.\nI wanted to help protect our local culture and language.\nThat is why I started this project."},
  {id:17, cat:"관심분야", q:"Q17. Why are you interested in space?", a:"Because there are still many things we do not know about space.\nI like learning about new discoveries.\nI think space is very interesting and mysterious."},
  {id:18, cat:"관심분야", q:"Q18. Why do you like dinosaurs?", a:"When I was young, I enjoyed reading books about dinosaurs.\nI was curious about why they disappeared.\nLearning about dinosaurs helped me become interested in science, climate, and space."},
  {id:19, cat:"지원동기", q:"Q19. What do you want to learn at APT JSO? (이번 프로그램에서 배우고 싶은 것)", a:"I want to learn more about climate change.\nI also want to learn how students from other countries think about science.\nMost of all, I want to learn through experiments and teamwork."},
  {id:20, cat:"지원동기", q:"Q20. Why should we choose you? (왜 너를 선택해야 하는지)", a:"I am very interested in science and climate change.\nI like learning new things and working with other people.\nI always try my best and do not give up easily.\nIf I am selected, I will actively participate and represent Korea well."},
  {id:21, cat:"독서·취미", q:"Q21. What is your favorite book? (제일 좋아하는 책)", a:"My favorite book is Project Hail Mary.\nIt is a science fiction novel about saving humanity.\nI enjoyed the science and teamwork in the story."},
  {id:22, cat:"독서·취미", q:"Q22. Why do you recommend Project Hail Mary? (책 추천 이유)", a:"Because it is fun and exciting.\nIt also shows how science can help solve difficult problems.\nI think many students will enjoy it."},
  {id:23, cat:"독서·취미", q:"Q23. What did you learn from Project Hail Mary? (무엇을 배웠나)", a:"I learned that science is important for solving problems.\nI also learned that teamwork is very important.\nPeople can achieve great things when they work together."},
  {id:24, cat:"독서·취미", q:"Q24. Who is your favorite character?", a:"My favorite character is Ryland Grace.\nHe does not give up when facing difficult situations.\nI like his attitude and problem-solving skills."},
  {id:25, cat:"한국·제주", q:"Q25. Can you introduce Jeju Island? (제주 소개)", a:"Jeju is a beautiful island in Korea.\nIt has volcanoes, beaches, and unique culture.\nThe weather changes quickly, so it helped me become interested in climate science."},
  {id:26, cat:"한국·제주", q:"Q26. What makes Jeju special? (제주는 무엇이 특별)", a:"Jeju has beautiful nature and a unique culture.\nIt also has its own language, the Jeju language.\nI think that makes Jeju very special."},
  {id:27, cat:"한국·제주", q:"Q27. What is the biggest environmental problem in Jeju? (제주의 환경문제)", a:"I think climate change is one of the biggest problems.\nTyphoons and unusual weather are becoming more common.\nThat is why I am interested in this topic."},
  {id:28, cat:"인성·태도", q:"Q28. What is your biggest strength? (강점)", a:"I am responsible and I do not give up easily.\nI also enjoy working with other people.\nI always try my best."},
  {id:29, cat:"인성·태도", q:"Q29. What is your biggest weakness?", a:"My weakness is that I sometimes cannot say no to people.\nI like helping my friends, so I often say yes.\nSometimes I become very busy.\nNow I am trying to manage my time better.\nI think I am getting better little by little."},
  {id:30, cat:"인성·태도", q:"Q30. What was the most difficult moment in your life?", a:"One of the hardest things in my life was having allergies.\nThere were foods I could not eat.\nBut I did not give up.\nI controlled my diet and tried to stay healthy.\nI learned that it is important to stay positive and keep trying."},
  {id:31, cat:"독서·취미", q:"Q31. What do you do in your free time?", a:"I like reading books about science.\nI also enjoy learning about space and climate.\nSometimes I work on coding projects."},
  {id:32, cat:"인성·태도", q:"Q32. What would you do if your English is not good enough? (영어 부족을 어떻게 극복)", a:"I will not be afraid.\nI will try my best to communicate.\nI think learning by doing is important.\nI will learn from my friends and teachers."},
];

let selectedId = null;
let currentCat = '전체';
let lastTs = null;
let pollTimer = null;

async function fbSet(data) {
  const res = await fetch(FIREBASE_URL + QA_PATH, { method: 'PUT', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(data) });
  return res.ok;
}
async function fbGet() {
  const res = await fetch(FIREBASE_URL + QA_PATH);
  if (!res.ok) return null;
  return await res.json();
}
async function checkConn() {
  try { await fbGet(); setConn(true); } catch(e) { setConn(false); }
}
function setConn(ok) {
  document.getElementById('conn-dot').className = 'dot ' + (ok ? 'live' : 'error');
  document.getElementById('conn-txt').textContent = ok ? 'Firebase 연결됨' : '연결 실패';
}

function allCats() { return ['전체', ...new Set(qaData.map(x => x.cat))]; }
function renderCatBar() {
  document.getElementById('cat-bar').innerHTML = allCats().map(c =>
    `<button class="cat-btn${c === currentCat ? ' active' : ''}" onclick="setCat('${c}')">${c}</button>`
  ).join('');
}
function setCat(c) { currentCat = c; renderCatBar(); renderList(); }

function renderList() {
  const kw = document.getElementById('search').value.toLowerCase();
  const filtered = qaData.filter(x => {
    const mc = currentCat === '전체' || x.cat === currentCat;
    const mk = !kw || x.q.toLowerCase().includes(kw) || x.a.toLowerCase().includes(kw) || x.cat.toLowerCase().includes(kw);
    return mc && mk;
  });
  const el = document.getElementById('qa-list');
  if (!filtered.length) { el.innerHTML = '<div class="no-result">검색 결과 없음</div>'; return; }
  el.innerHTML = filtered.map(x => `
    <div class="qa-card${x.id === selectedId ? ' selected' : ''}" onclick="selectCard(${x.id})">
      <div class="card-cat">${x.cat}</div>
      <div class="card-q">${x.q}</div>
      <div class="card-a-prev">${x.a.replace(/\n/g,' ')}</div>
    </div>`).join('');
}

function selectCard(id) {
  selectedId = id;
  renderList();
  const card = qaData.find(x => x.id === id);
  if (!card) return;
  document.getElementById('preview-title').textContent = card.cat + ' — 선택됨';
  document.getElementById('selected-preview').innerHTML = `
    <div class="preview-cat">${card.cat}</div>
    <div class="preview-q">${card.q}</div>
    <div class="preview-a">${card.a}</div>`;
  document.getElementById('send-btn').disabled = false;
}

async function sendCard() {
  const card = qaData.find(x => x.id === selectedId);
  if (!card) return;
  const btn = document.getElementById('send-btn');
  btn.disabled = true;
  btn.textContent = '전송 중...';
  const payload = { ...card, ts: Date.now(), clear: false };
  const ok = await fbSet(payload);
  document.getElementById('send-status').textContent = ok
    ? '✓ ' + new Date().toLocaleTimeString('ko') + ' 전송 완료'
    : '⚠ 전송 실패';
  btn.textContent = '▶ 답변자 화면에 전송';
  btn.disabled = false;
}

async function clearCard() {
  await fbSet({ clear: true, ts: Date.now() });
  selectedId = null;
  document.getElementById('send-btn').disabled = true;
  document.getElementById('send-status').textContent = '';
  document.getElementById('preview-title').textContent = '카드를 선택하세요';
  document.getElementById('selected-preview').innerHTML = `
    <div class="empty-state">
      <div class="empty-icon">📋</div>
      <div style="font-size:14px">왼쪽에서 Q&A 카드를 선택하세요</div>
    </div>`;
  renderList();
}

function openAddModal() { document.getElementById('modal').classList.add('open'); }
function closeModal() { document.getElementById('modal').classList.remove('open'); }
function saveCard() {
  const cat = document.getElementById('m-cat').value.trim();
  const q = document.getElementById('m-q').value.trim();
  const a = document.getElementById('m-a').value.trim();
  if (!cat || !q || !a) { alert('모든 항목을 입력해주세요'); return; }
  qaData.push({ id: Date.now(), cat, q, a });
  document.getElementById('m-cat').value = '';
  document.getElementById('m-q').value = '';
  document.getElementById('m-a').value = '';
  closeModal();
  renderCatBar();
  renderList();
}

function startPolling() {
  if (pollTimer) return;
  pollTimer = setInterval(async () => {
    try {
      const data = await fbGet();
      if (!data || data.ts === lastTs) return;
      lastTs = data.ts;
      setConn(true);
      if (data.clear) { showPresenterEmpty(); return; }
      showPresenterCard(data);
    } catch(e) { setConn(false); }
  }, 1500);
}

function showPresenterCard(d) {
  document.getElementById('p-empty').style.display = 'none';
  document.getElementById('p-card').style.display = 'block';
  document.getElementById('p-cat').textContent = d.cat;
  document.getElementById('p-q').textContent = d.q;
  document.getElementById('p-a').textContent = d.a;
  const badge = document.getElementById('p-badge');
  badge.style.display = 'block';
  setTimeout(() => badge.style.display = 'none', 2800);
}
function showPresenterEmpty() {
  document.getElementById('p-empty').style.display = 'flex';
  document.getElementById('p-card').style.display = 'none';
}

function setMode(m) {
  document.querySelectorAll('.mode-tab').forEach((b, i) => { b.classList.toggle('active', ['operator','presenter'][i] === m); });
  document.getElementById('panel-operator').classList.toggle('active', m === 'operator');
  const pp = document.getElementById('panel-presenter');
  pp.classList.toggle('active', m === 'presenter');
  if (m === 'presenter') startPolling();
}

const urlMode = new URLSearchParams(location.search).get('mode');
if (urlMode === 'presenter') setMode('presenter');

renderCatBar();
renderList();
checkConn();
setInterval(checkConn, 10000);
startPolling();
</script>
</body>
</html>
